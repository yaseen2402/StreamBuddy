<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamBuddy — Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f2;
      --surface: #ffffff;
      --border: #e2e0d8;
      --text: #1a1917;
      --text-muted: #6b6962;
      --accent: #1D9E75;
      --purple: #534AB7;
      --amber: #BA7517;
      --coral: #D85A30;
      --gray-soft: #f1efe8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2rem 3rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #1a1917;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 20px; height: 20px; }

    .header-text h1 {
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .header-text p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 2px;
      font-family: 'DM Mono', monospace;
    }

    .badge {
      margin-left: auto;
      font-size: 0.72rem;
      font-family: 'DM Mono', monospace;
      background: #e8f8f2;
      color: #0F6E56;
      border: 1px solid #5DCAA5;
      border-radius: 20px;
      padding: 3px 10px;
      font-weight: 500;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem 3rem;
    }

    .diagram-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 960px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .diagram-card svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .meta-row {
      display: flex;
      gap: 1.5rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .meta-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    footer {
      text-align: center;
      padding: 1.2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="10" cy="10" r="4" fill="#1D9E75"/>
      <circle cx="10" cy="10" r="8" stroke="#1D9E75" stroke-width="1.5" fill="none"/>
      <circle cx="10" cy="10" r="2" fill="white"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>StreamBuddy</h1>
    <p>streambuddy.slicksage.com · System Architecture</p>
  </div>
  
</header>
